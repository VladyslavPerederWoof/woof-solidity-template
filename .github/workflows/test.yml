name: Testing

on:
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.sol"
      - "hardhat.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.sol"
      - "hardhat.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: pnpm run build

      - name: Run tests
        run: pnpm run test
